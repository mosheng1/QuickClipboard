name: CI
run-name: CI — ${{ github.event_name == 'pull_request' && format('PR #{0}', github.event.pull_request.number) || github.ref_name }}

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  # =========================================================================
  # Lint — ESLint 静态检查
  # =========================================================================
  lint:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            src-tauri/plugins/screenshot-suite-oss/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint . --ext .js,.jsx

  # =========================================================================
  # Test — Vitest 单元测试
  # =========================================================================
  test:
    runs-on: windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            src-tauri/plugins/screenshot-suite-oss/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run Vitest
        run: npm run test --workspace=screenshot-suite-oss-web

  # =========================================================================
  # Test E2E — Playwright 端到端测试
  # =========================================================================
  test-e2e:
    runs-on: windows-latest
    needs: [lint, test]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            src-tauri/plugins/screenshot-suite-oss/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Start Vite dev server
        run: |
          Start-Process -NoNewWindow -FilePath "npx" -ArgumentList "vite" -PassThru
          # 等待 dev server 就绪
          $maxRetries = 30
          for ($i = 0; $i -lt $maxRetries; $i++) {
            try {
              $response = Invoke-WebRequest -Uri "http://localhost:1421" -TimeoutSec 2 -UseBasicParsing
              if ($response.StatusCode -eq 200) {
                Write-Host "Vite dev server ready on port 1421"
                break
              }
            } catch {
              Start-Sleep -Seconds 2
            }
          }
          if ($i -ge $maxRetries) {
            Write-Error "Vite dev server failed to start within timeout"
            exit 1
          }
        shell: pwsh

      - name: Run Playwright tests
        run: npm run test:e2e --workspace=screenshot-suite-oss-web
        env:
          CI: true

      - name: Upload Playwright report (on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: src-tauri/plugins/screenshot-suite-oss/web/test-results/
          retention-days: 7

      - name: Stop Vite dev server
        if: always()
        run: |
          Get-Process -Name "node" -ErrorAction SilentlyContinue | Stop-Process -Force
        shell: pwsh
